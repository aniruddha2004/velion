name: personal_news_assistant
description: A personal news assistant app for saving and organizing news links
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State management
  flutter_riverpod: ^2.4.9
  
  # Local storage - Hive
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UUID generation
  uuid: ^4.2.1
  
  # Link preview
  http: ^1.1.0
  html: ^0.15.4
  url_launcher: ^6.2.2
  
  # Share receiver
  receive_sharing_intent: ^1.8.0
  
  # UI utilities
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  intl: ^0.19.0
  
  # Performance
  flutter_staggered_animations: ^1.1.1
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

# flutter_launcher_icons:
#   Uncomment and configure after creating icons:
#   android: "ic_launcher"
#   ios: true
#   image_path: "assets/icon/launcher_icon.png"
#   min_sdk_android: 21
#   adaptive_icon_background: "#6366F1"
#   adaptive_icon_foreground: "assets/icon/launcher_icon_foreground.png"

flutter:
  uses-material-design: true
